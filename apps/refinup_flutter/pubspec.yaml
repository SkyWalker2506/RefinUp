name: refinup_flutter
description: RefinUp Flutter application

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  refinup_core:
    path: ../../packages/core/refinup_core
  refinup_ai_interface:
    path: ../../packages/ai/refinup_ai_interface
  refinup_model_registry:
    path: ../../packages/ai/refinup_model_registry
  refinup_agent_catalog:
    path: ../../packages/agents/refinup_agent_catalog
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - packages/refinup_model_registry/assets/
